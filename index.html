<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Builders — Terminal Interface</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* Base Styling Framework to prevent structural breaks on code merger */
        :root {
            --primary: #01940b;
            --bg: #0d0d0d;
            --card: #141414;
            --border: #222222;
            --text: #ffffff;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }
        .app-view { display: none; padding: 20px; }
        .app-view.active { display: block; }
        .wizard-container, .modal, .dm-box { display: flex; flex-direction: column; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; border: 1px solid var(--border); }
        .modal-content input, .modal-content select, .modal-content textarea, .wizard-container select, .wizard-container textarea { width: 100%; padding: 10px; margin-bottom: 12px; box-sizing: border-box; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; }
        .dm-box { display: none; position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: var(--card); border: 1px solid var(--primary); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 999; }
        .dm-header { background: var(--primary); padding: 12px; font-weight: bold; display: flex; justify-content: space-between; border-radius: 10px 10px 0 0; }
        .dm-logs { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .dm-input-area { padding: 10px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
        .dm-input-area input { flex-grow: 1; padding: 8px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; }
        .dm-input-area button { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-view" id="vaultView">
        <div class="wizard-container" id="developerGameConsole" style="max-width: 550px; margin-bottom: 30px; display: none;">
            <h2 style="text-transform: uppercase; color: #00a2ff; margin-top:0;">🕹️ Build Archive Submission Terminal</h2>
            <input type="text" id="vaultGameName" placeholder="Project Node Title">
            <input type="url" id="vaultGameUrl" placeholder="Binary Download URL (.zip, .apk, .exe)">
            <input type="url" id="vaultGameImg" placeholder="Cover Image Art URL">
            <input type="number" id="vaultGamePrice" placeholder="Value Matrix License Cost (₹) (Leave 0 for Free)" min="0">
            <textarea id="vaultGameDesc" placeholder="Write level constraints, control mappings..." rows="2"></textarea>
            <button onclick="submitGameToVault()" style="background:#00a2ff; color:#fff; border:none; padding:12px 24px; border-radius:8px; font-weight:bold; cursor:pointer; text-transform:uppercase;">Submit Title Node</button>
        </div>
        <div class="market-grid" id="vaultGameGrid"></div>
    </div>

    <div class="app-view" id="jobsView">
        <div class="wizard-container" style="max-width: 550px;">
            <h2 style="text-transform: uppercase; color: #0284c7; margin-top:0; font-style: italic;">💼 Squad Recruitment Desk</h2>
            <select id="jobRole">
                <option value="Advertising Idea Giver">Advertising Idea Giver — Creative Concepts</option>
                <option value="Social Media Manager">Social Media Manager — Community Growth</option>
                <option value="Godot Game Developer">Godot Game Systems Developer (3D Physics)</option>
                <option value="PC Hardware Specialist">PC Rig Assembly & Repair Specialist</option>
            </select>
            <textarea id="jobSkills" placeholder="List your experiences or execution ideas..." rows="5"></textarea>
            <button onclick="submitJobApplication()" style="width:100%; background:linear-gradient(180deg, #60a5fa, #2563eb); color:white; border:none; padding:14px; border-radius:12px; font-weight:bold; cursor:pointer; text-transform:uppercase;">Submit Application Packet</button>
        </div>
    </div>

    <div class="modal" id="sellModal">
        <div class="modal-content">
            <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 20px; text-transform: uppercase;">Post New Listing</h2>
            <select id="hardwareType">
                <option value="Component">Component (GPU, CPU, RAM, etc.)</option>
                <option value="Full PC">Full Desktop PC Setup</option>
                <option value="Laptop">Laptop Computer</option>
            </select>
            <input type="text" id="hardwareName" placeholder="e.g., RX 580 8GB">
            <input type="url" id="hardwareImg" placeholder="Paste image web URL">
            <input type="number" id="hardwareStock" value="1" min="1">
            <textarea id="sellerThoughts" placeholder="Share condition status indicators..." rows="3"></textarea>
            
            <input type="number" id="origPrice" placeholder="Original price (₹)" oninput="calculateHardwareValue()">
            <select id="hardwareCondition" onchange="calculateHardwareValue()">
                <option value="1.0">Mint / Like New (0% Drop)</option>
                <option value="0.85">Good / Clean (15% Drop)</option>
                <option value="0.65">Rough / Heavily Used (35% Drop)</option>
            </select>

            <div style="background:rgba(1,148,11,0.08); padding:18px; border-radius:15px; margin-bottom:20px; border:1px solid var(--primary);">
                <b id="aiVal" style="font-size: 26px; color: var(--primary);">₹0</b>
            </div>
            <button onclick="submitSell()" style="background:var(--primary); color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer; text-transform: uppercase;">Confirm & Post Listing</button>
            <button onclick="closeModals()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer; font-weight: bold;">Cancel</button>
        </div>
    </div>

    <div class="dm-box" id="dmBox">
        <div class="dm-header">
            <span id="dmTargetTitle">Seller Conversation</span>
            <span style="cursor:pointer;" onclick="closeDMWindow()">✖</span>
        </div>
        <div class="dm-logs" id="dmLogs"></div>
        <div class="dm-input-area">
            <input type="text" id="dmInput" placeholder="Write message..." onkeypress="handleDMKey(event)">
            <button onclick="sendDMMessage()">Send</button>
        </div>
    </div>

    <div id="authGate" style="display: none;"></div>
    <div id="userDisplayTag"></div>
    <div id="userOrdersGrid"></div>
    <div id="opsGrid"></div>
    <div id="reportsOpsGrid"></div>
    <div id="hrOpsGrid"></div>
    <div id="marketGrid"></div>
    <div id="cartCount"></div>
    <div id="cartItemsContainer"></div>
    <div id="cartTotalValue"></div>
    <div id="wizBudgetSlider"></div>
    <div id="wizBudgetManual"></div>
    <div id="wizPriceDisplay"></div>
    <div id="generatedSpecsArea"></div>
    <div id="wizardInvoiceTotal"></div>

    <script>
        // CORE BACKEND INITIALIZATION CONFIGURATIONS
        const firebaseConfig = {
            apiKey: "AIzaSy" + "CP1yvH-mJx7_vxtG4k18PjforZicWTXm4", 
            authDomain: "potato-builders.firebaseapp.com",
            databaseURL: "https://potato-builders-default-rtdb.firebaseio.com",
            projectId: "potato-builders",
            storageBucket: "potato-builders.firebasestorage.app",
            messagingSenderId: "829474107482", 
            appId: "1:829474107482:web:b1110a502c90aefb87e863"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const localAccounts = {
            "nafeez": "1234",
            "admin": "potato2026",
            "opsmanager": "opspass2026",
            "guest": "0000"
        };

        let cart = [];
        let marketItems = []; 
        let activeDMPath = null;
        let currentUser = null; 
        let computedAppraisalValue = 0;
        let currentFilterCategory = 'all';
        let searchQueryString = '';
        let selectedCategoryNode = 'gaming';
        let activeSelectedBudget = 15000;
        let searchDebounceTimeout = null;

        function applyCorporateTheme(themeName) {
            document.body.className = ""; 
            document.querySelectorAll('.theme-toggle-btn').forEach(btn => btn.classList.remove('active'));
            if (themeName !== 'matrix') document.body.classList.add('theme-' + themeName);
            let themeBtn = document.getElementById('theme-btn-' + themeName);
            if(themeBtn) themeBtn.classList.add('active');
            localStorage.setItem('potato_terminal_theme', themeName);
        }

        function handleTerminalLogin() {
            let user = document.getElementById('authUsername').value.trim().toLowerCase();
            let pass = document.getElementById('authPassword').value.trim();
            if(!user || !pass) { alert("Please input credentials."); return; }
            if (localAccounts[user] && localAccounts[user] === pass) {
                loginSuccess(user);
            } else {
                alert("Access Denied!");
            }
        }

        function loginSuccess(username) {
            currentUser = username;
            localStorage.setItem('potato_local_session', username);
            
            let authGateNode = document.getElementById('authGate');
            if(authGateNode) authGateNode.style.display = 'none';
            
            let userTag = document.getElementById('userDisplayTag');
            if(userTag) userTag.innerText = `USER: ${username.toUpperCase()}`;
            
            listenToMarketplace();
            listenToGameVault();
            syncUserPersonalOrders(username);
            selectCategory('gaming');
            
            let savedTheme = localStorage.getItem('potato_terminal_theme') || 'matrix';
            applyCorporateTheme(savedTheme);

            if (username === 'nafeez' || username === 'admin') {
                let devConsole = document.getElementById('developerGameConsole');
                if(devConsole) devConsole.style.display = 'block';
            }

            if (username === 'nafeez' || username === 'admin' || username === 'opsmanager') {
                document.querySelectorAll('.admin-only-nav').forEach(el => el.style.display = 'block');
                syncOperationsPipeline();
                syncHRApplications();
                syncViolationReports();
            }
        }

        function syncUserPersonalOrders(username) {
            database.ref('marketplace/orders').on('value', snapshot => {
                let container = document.getElementById('userOrdersGrid');
                if (!container) return;
                container.innerHTML = "";
                let orders = snapshot.val();
                let matchCount = 0;

                if (!orders) {
                    container.innerHTML = `<div style="color:#666; font-size:13px;">No personal transactions deployed in current matrix session.</div>`;
                    return;
                }

                Object.keys(orders).reverse().forEach(key => {
                    let ord = orders[key];
                    if (ord.buyerName === username) {
                        matchCount++;
                        let dateStr = new Date(ord.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        let contents = ord.purchasedItemsArray ? ord.purchasedItemsArray.map(i => i.title).join(', ') : "Custom Configurator Build Rig";
                        
                        container.innerHTML += `
                            <div style="background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; gap: 15px;">
                                <div>
                                    <span style="font-size: 10px; background: rgba(1, 148, 11, 0.1); color: var(--primary); padding: 2px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase;">Processing Shipment</span>
                                    <h4 style="margin: 6px 0 4px 0; font-size: 14px;">${contents}</h4>
                                    <p style="margin: 0; font-size: 12px; color: #666;">Placed at ${dateStr} • Invoice Total: <b>₹${ord.invoiceCost.toLocaleString('en-IN')}</b></p>
                                </div>
                                <button onclick="executeUserOrderCancellation('${key}')" style="background: #ff4444; color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer;">✕ Cancel & Refund</button>
                            </div>`;
                    }
                });

                if (matchCount === 0) {
                    container.innerHTML = `<div style="color:#666; font-size:13px;">No personal transactions deployed in current matrix session.</div>`;
                }
            });
        }

        function executeUserOrderCancellation(orderId) {
            if (!confirm("Are you sure you want to cancel this order? Your funds will be routed back instantly and items returned to shelves.")) return;

            database.ref(`marketplace/orders/${orderId}`).once('value', snapshot => {
                let orderData = snapshot.val();
                if (!orderData) return;

                let updates = {};
                if (orderData.purchasedItemsArray && Array.isArray(orderData.purchasedItemsArray)) {
                    orderData.purchasedItemsArray.forEach(purchasedItem => {
                        let currentMarketItem = marketItems.find(m => m.id === purchasedItem.itemId);
                        if (currentMarketItem) {
                            let updatedStockCount = (parseInt(currentMarketItem.stocks) || 0) + 1;
                            updates[`marketplace/items/${purchasedItem.itemId}/stocks`] = updatedStockCount;
                        }
                    });
                }

                updates[`marketplace/orders/${orderId}`] = null;
                database.ref().update(updates).then(() => alert("💰 Order cancelled successfully!"));
            });
        }

        function reportMarketplaceListing(itemId, itemTitle) {
            let reason = prompt(`🚨 FLAG REPORT ACTION ENGINE\nTarget Item: ${itemTitle.toUpperCase()}\n\nPlease write the violation reason:`);
            if (!reason || reason.trim() === "") return;

            database.ref('marketplace/reports').push({
                reportedItemId: itemId,
                reportedItemTitle: itemTitle,
                flaggedBy: currentUser || "anonymous_node",
                violationReason: reason.trim(),
                timestamp: Date.now()
            }).then(() => alert("🔒 Security Logged: Listing flagged for internal squad review!"));
        }

        function syncOperationsPipeline() {
            database.ref('marketplace/orders').on('value', snapshot => {
                let grid = document.getElementById('opsGrid'); if(!grid) return;
                grid.innerHTML = "";
                let orders = snapshot.val();
                if (!orders) { grid.innerHTML = `<div style="color:#555; padding:20px;">No active client builds running.</div>`; return; }

                Object.keys(orders).reverse().forEach(key => {
                    let ord = orders[key];
                    let contents = ord.purchasedItemsArray ? ord.purchasedItemsArray.map(i => i.title).join(', ') : "Custom Configurator Build Rig";
                    grid.innerHTML += `
                        <div class="ops-order-card" style="border-left: 4px solid #1a73e8; position: relative; padding: 15px; background: var(--card); margin-bottom: 10px; border-radius: 8px;">
                            <button class="delete-listing-btn" onclick="terminateAndRestockOrder('${key}')" style="position: absolute; right: 10px; top: 10px; background: none; border: none; color: #ff4444; cursor: pointer; font-weight: bold;">✕</button>
                            <span class="ops-badge" style="background: rgba(26,115,232,0.1); color: #1a73e8; padding: 2px 6px; border-radius: 4px; font-size: 11px;">${ord.buyerName.toUpperCase()}</span>
                            <h4 style="margin: 8px 0 4px 0;">${ord.orderType}</h4>
                            <p style="font-size:13px; margin:4px 0; color: #aaa;">📦 Content Node: ${contents}</p>
                            <b style="color:var(--primary)">₹${ord.invoiceCost.toLocaleString('en-IN')}</b>
                        </div>`;
                });
            });
        }

        function terminateAndRestockOrder(orderId) {
            if (!confirm("Permanently wipe this order log and return items to shelves?")) return;
            database.ref(`marketplace/orders/${orderId}`).once('value', snapshot => {
                let orderData = snapshot.val(); if (!orderData) return;
                let updates = {};
                if (orderData.purchasedItemsArray && Array.isArray(orderData.purchasedItemsArray)) {
                    orderData.purchasedItemsArray.forEach(pItem => {
                        let curItem = marketItems.find(m => m.id === pItem.itemId);
                        if (curItem) updates[`marketplace/items/${pItem.itemId}/stocks`] = (parseInt(curItem.stocks) || 0) + 1;
                    });
                }
                updates[`marketplace/orders/${orderId}`] = null;
                database.ref().update(updates);
            });
        }

        function syncViolationReports() {
            database.ref('marketplace/reports').on('value', snapshot => {
                let container = document.getElementById('reportsOpsGrid'); if(!container) return;
                container.innerHTML = "";
                let reports = snapshot.val();
                if (!reports) { container.innerHTML = `<div style="text-align:center; color:#555; padding:40px;">No incidents inside database matrices.</div>`; return; }

                Object.keys(reports).reverse().forEach(key => {
                    let rep = reports[key];
                    container.innerHTML += `
                        <div class="ops-order-card" style="border-left: 4px solid #ff4444; position: relative; padding: 15px; background: var(--card); margin-bottom: 10px; border-radius: 8px;">
                            <button class="delete-listing-btn" onclick="database.ref('marketplace/reports/${key}').remove()" style="position: absolute; right: 10px; top: 10px; background: none; border: none; color: #ff4444; cursor: pointer;">✕</button>
                            <h4>🚩 Flawed Context: ${rep.reportedItemTitle}</h4>
                            <p style="margin:4px 0; font-size:12px; color:#aaa;">Reported by: ${rep.flaggedBy.toUpperCase()}</p>
                            <p style="margin:4px 0; font-size:13px; color:#ff4444;"><b>Reason:</b> ${rep.violationReason}</p>
                        </div>`;
                });
            });
        }

        function checkoutTerminal() {
            if(cart.length === 0) return;
            let updates = {}; let orderId = "order_" + Date.now();
            let itemsPayload = cart.map(c => ({ itemId: c.itemId, title: c.title }));
            let totalCartInvoiceCost = cart.reduce((acc, current) => acc + current.price, 0);

            updates[`marketplace/orders/${orderId}`] = {
                orderType: "Marketplace Checkout",
                buyerName: currentUser,
                invoiceCost: totalCartInvoiceCost,
                purchasedItemsArray: itemsPayload, 
                timestamp: Date.now()
            };

            cart.forEach(c => {
                let dbItem = marketItems.find(i => i.id === c.itemId);
                if(dbItem) updates[`marketplace/items/${c.itemId}/stocks`] = Math.max(0, parseInt(dbItem.stocks) - 1);
            });
            
            database.ref().update(updates).then(() => { 
                cart = []; 
                updateCartUI(); 
                toggleCart(); 
                alert("Transaction Completed!"); 
            });
        }

        function listenToMarketplace() {
            database.ref('marketplace/items').on('value', snapshot => {
                const data = snapshot.val(); marketItems = [];
                if(data) Object.keys(data).forEach(key => { marketItems.push({ id: key, ...data[key] }); });
                renderMarketGrid();
            });
        }

        function handleSearchInput(event) {
            clearTimeout(searchDebounceTimeout);
            searchDebounceTimeout = setTimeout(() => {
                searchQueryString = event.target.value.trim().toLowerCase();
                renderMarketGrid();
            }, 250);
        }

        function renderMarketGrid() {
            let grid = document.getElementById('marketGrid'); if(!grid) return;
            grid.innerHTML = "";
            
            let itemsToDisplay = marketItems.filter(item => {
                let matchesCategory = (currentFilterCategory === 'all' || item.type === currentFilterCategory);
                let matchesSearch = (!searchQueryString || item.title.toLowerCase().includes(searchQueryString));
                return matchesCategory && matchesSearch;
            });

            itemsToDisplay.forEach(item => {
                let stockCount = parseInt(item.stocks) || 0;
                let buyActionBtn = stockCount <= 0 
                    ? `<button disabled style="background:#333; color:#666; padding:8px; border-radius:6px; font-weight:bold; border:none;">SOLD OUT</button>`
                    : `<button onclick="addToCart('${item.id}', '${item.title}', ${item.price})" style="background:var(--primary); border:none; color:white; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold;">🛒 +</button>`;
                let deleteBtn = (currentUser && item.sellerName === currentUser) ? `<button class="delete-listing-btn" onclick="database.ref('marketplace/items/${item.id}').remove()" style="position:absolute; right:10px; top:10px; background:rgba(0,0,0,0.5); border:none; color:white; border-radius:50%; width:24px; height:24px; cursor:pointer;">✖</button>` : "";
                
                let fallbackImg = 'https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400';
                let targetImg = item.imageUrl || fallbackImg;

                grid.innerHTML += `
                    <div class="market-card" style="position:relative; background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column;">
                        ${deleteBtn}
                        <div class="market-img-container" style="width:100%; height:180px; background:#111;">
                            <img src="${targetImg}" loading="lazy" alt="${item.title}" class="market-img" style="width:100%; height:100%; object-fit:cover;" onerror="this.onerror=null; this.src='${fallbackImg}';">
                        </div>
                        <div class="market-details" style="padding:15px; flex-grow:1; display:flex; flex-direction:column; justify-content:space-between; gap:10px;">
                            <div>
                                <div style="font-weight:bold; font-size:16px;">${item.title}</div>
                                <div class="market-tag-container" style="margin-top:6px; display:flex; gap:5px;">
                                    <span class="market-tag prime" style="font-size:10px; background:rgba(0,162,255,0.1); color:#00a2ff; padding:2px 6px; border-radius:4px;">${item.type.toUpperCase()}</span>
                                    <span class="market-tag" style="font-size:10px; background:rgba(255,255,255,0.05); color:#aaa; padding:2px 6px; border-radius:4px;">Stock: ${stockCount}</span>
                                </div>
                                <div style="color:var(--primary); font-weight:900; font-size:18px; margin:10px 0 0 0;">₹${item.price.toLocaleString('en-IN')}</div>
                            </div>
                            <div class="market-action-row" style="display:flex; gap:6px; margin-top:auto;">
                                ${buyActionBtn}
                                <button onclick="openInternalDM('${item.id}', '${item.title}', '${item.sellerName}')" class="chat-seller-btn" style="flex-grow:1; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; border-radius:6px; cursor:pointer;">💬 Chat</button>
                                <button onclick="reportMarketplaceListing('${item.id}', '${item.title}')" style="background:#222; border:1px solid #ff4444; color:#ff4444; border-radius:6px; padding:8px 10px; cursor:pointer; font-weight:bold;">🚩</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function addToCart(itemId, title, price) { cart.push({ cartId: Date.now(), itemId, title, price }); updateCartUI(); }
        function removeFromCart(id) { cart = cart.filter(c => c.cartId !== id); updateCartUI(); }
        
        function updateCartUI() {
            let countEl = document.getElementById('cartCount'); if(countEl) countEl.innerText = cart.length;
            let container = document.getElementById('cartItemsContainer'); if(!container) return;
            container.innerHTML = ""; 
            
            let computedTotalSum = cart.reduce((accumulator, item) => accumulator + item.price, 0);
            
            cart.forEach(c => { 
                container.innerHTML += `<div class="cart-item-card" style="display:flex; justify-content:space-between; margin-bottom:8px; padding:6px; background:rgba(0,0,0,0.2); border-radius:4px;"><b>${c.title}</b><button class="remove-item-btn" onclick="removeFromCart(${c.cartId})" style="background:none; border:none; color:#ff4444; cursor:pointer;">✖</button></div>`; 
            });
            
            let totalValEl = document.getElementById('cartTotalValue');
            if(totalValEl) totalValEl.innerText = "₹" + computedTotalSum.toLocaleString('en-IN');
        }

        function openInternalDM(itemId, itemTitle, sellerName) {
            if(!currentUser || currentUser === sellerName) return;
            activeDMPath = `marketplace/chats/${itemId}_${currentUser}`;
            document.getElementById('dmTargetTitle').innerText = `Chat: ${itemTitle}`;
            document.getElementById('dmBox').style.display = 'flex';
            database.ref(activeDMPath).on('value', snapshot => {
                let logs = document.getElementById('dmLogs'); if(!logs) return;
                logs.innerHTML = ""; let msgs = snapshot.val();
                if(msgs) Object.keys(msgs).forEach(k => {
                    let m = msgs[k]; let align = m.senderName === currentUser ? 'align-self:flex-end; background:var(--primary);' : 'align-self:flex-start; background:rgba(0,0,0,0.3);';
                    logs.innerHTML += `<div style="padding:8px; border-radius:8px; margin-bottom:4px; max-width:80%; ${align}"><b>${m.senderName.toUpperCase()}:</b> ${m.msgText}</div>`;
                });
            });
        }

        function sendDMMessage() {
            let el = document.getElementById('dmInput'); let txt = el.value.trim(); if(!txt || !activeDMPath) return;
            database.ref(activeDMPath).push({ senderName: currentUser, msgText: txt, timestamp: Date.now() }).then(() => el.value = "");
        }

        function syncBudgetInputs(source) {
            let slider = document.getElementById('wizBudgetSlider'); let manual = document.getElementById('wizBudgetManual');
            if(!slider || !manual) return;
            activeSelectedBudget = source === 'slider' ? parseInt(slider.value) : Math.max(15000, Math.min(400000, parseInt(manual.value) || 15000));
            slider.value = activeSelectedBudget; manual.value = activeSelectedBudget;
            document.getElementById('wizPriceDisplay').innerText = activeSelectedBudget.toLocaleString('en-IN');
            generateDynamicSpecs(); calculateFinalWizardPrice();
        }

        function changeWizardStep(stepNum) { document.querySelectorAll('.wizard-step').forEach(s => s.classList.remove('active')); let targetStep = document.getElementById('wizStep' + stepNum); if(targetStep) targetStep.classList.add('active'); }
        function selectCategory(catId) { selectedCategoryNode = catId; document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected')); let catCard = document.getElementById('cat-' + catId); if(catCard) catCard.classList.add('selected'); generateDynamicSpecs(); }
        
        function generateDynamicSpecs() {
            let b = activeSelectedBudget; let out = "";
            if (selectedCategoryNode === 'gaming') {
                out = b <= 30000 ? `<b>CPU:</b> i3-10105F | <b>GPU:</b> RX 580 8GB` : `<b>CPU:</b> i5-12400F | <b>GPU:</b> RTX 4060`;
            } else { out = `<b>CPU:</b> High-Core Performance System Architecture`; }
            let specsArea = document.getElementById('generatedSpecsArea'); if(specsArea) specsArea.innerHTML = out;
        }

        function goToStep3() {
            changeWizardStep(3);
            database.ref('marketplace/orders').once('value', snap => {
                let orders = snap.val(); let hasOrdered = false;
                if (orders) Object.keys(orders).forEach(k => { if(orders[k].buyerName === currentUser) hasOrdered = true; });
                let checkCoin = document.getElementById('useTreasureCheckbox'); if(checkCoin) checkCoin.disabled = !hasOrdered;
                let titleCoin = document.getElementById('treasureTitle'); if(titleCoin) titleCoin.innerText = hasOrdered ? "✨ Treasure Coins Active!" : "🔒 Treasure Locked";
                calculateFinalWizardPrice();
            });
        }

        function calculateFinalWizardPrice() {
            let hasCoinChecked = document.getElementById('useTreasureCheckbox') ? document.getElementById('useTreasureCheckbox').checked : false;
            let cost = activeSelectedBudget - (hasCoinChecked ? 500 : 0);
            let invoiceEl = document.getElementById('wizardInvoiceTotal'); if(invoiceEl) invoiceEl.innerText = "₹" + cost.toLocaleString('en-IN');
            return cost;
        }

        function finalizeWizardBuildOrder() {
            let payload = {
                orderType: "Custom Wizard Build", buyerName: currentUser, allocatedBudget: activeSelectedBudget,
                invoiceCost: calculateFinalWizardPrice(), timestamp: Date.now()
            };
            database.ref('marketplace/orders').push(payload).then(() => { changeWizardStep(1); switchTab('marketView'); });
        }

        function calculateHardwareValue() {
            let orig = parseFloat(document.getElementById('origPrice').value) || 0;
            let cond = parseFloat(document.getElementById('hardwareCondition').value);
            computedAppraisalValue = Math.round(orig * 0.60 * cond);
            document.getElementById('aiVal').innerText = "₹" + computedAppraisalValue.toLocaleString('en-IN');
        }

        function submitSell() {
            let title = document.getElementById('hardwareName').value.trim(); if(!title || computedAppraisalValue <= 0) return;
            database.ref('marketplace/items').push({ 
                title, imageUrl: document.getElementById('hardwareImg').value.trim(), stocks: parseInt(document.getElementById('hardwareStock').value) || 1, 
                thoughts: document.getElementById('sellerThoughts').value.trim(), price: computedAppraisalValue, type: document.getElementById('hardwareType').value, sellerName: currentUser, timestamp: Date.now() 
            }).then(() => closeModals());
        }

        function submitGameToVault() {
            database.ref('marketplace/vault_games').push({
                title: document.getElementById('vaultGameName').value.trim(), downloadUrl: document.getElementById('vaultGameUrl').value.trim(),
                description: document.getElementById('vaultGameDesc').value.trim(), price: parseInt(document.getElementById('vaultGamePrice').value) || 0,
                imageUrl: document.getElementById('vaultGameImg').value.trim(), timestamp: Date.now()
            }).then(() => alert("🕹️ Game written to archive matrices!"));
        }

        function listenToGameVault() {
            database.ref('marketplace/vault_games').on('value', snap => {
                let grid = document.getElementById('vaultGameGrid'); if(!grid) return;
                grid.innerHTML = ""; let games = snap.val();
                if(!games) return;
                Object.keys(games).forEach(k => {
                    let g = games[k];
                    grid.innerHTML += `
                        <div class="market-card" style="border: 1px dashed #00a2ff; padding:15px; background:var(--card); border-radius:8px;">
                            <div class="market-details">
                                <h3 style="margin:0;">🎮 ${g.title.toUpperCase()}</h3>
                                <p style="font-size:12px; color:#aaa; margin:8px 0;">${g.description}</p>
                                <a href="${g.downloadUrl}" target="_blank"><button style="background:#1a73e8; color:#fff; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">📥 DOWNLOAD</button></a>
                            </div>
                        </div>`;
                });
            });
        }

        function submitJobApplication() {
            database.ref('marketplace/job_applications').push({
                applicantName: currentUser || "anonymous_node", role: document.getElementById('jobRole').value,
                skillDescription: document.getElementById('jobSkills').value.trim(), timestamp: Date.now()
            }).then(() => { document.getElementById('jobSkills').value = ""; alert("🚀 Application Packet Shared!"); });
        }

        function syncHRApplications() {
            database.ref('marketplace/job_applications').on('value', snapshot => {
                let hrGrid = document.getElementById('hrOpsGrid'); if(!hrGrid) return;
                hrGrid.innerHTML = "";
                let applications = snapshot.val(); if (!applications) return;
                Object.keys(applications).forEach(key => {
                    let app = applications[key];
                    hrGrid.innerHTML += `
                        <div class="ops-order-card" style="border-left: 4px solid #38ef7d; position:relative; padding:15px; background:var(--card); margin-bottom:10px; border-radius:8px;">
                            <button class="delete-listing-btn" onclick="database.ref('marketplace/job_applications/${key}').remove()" style="position:absolute; right:10px; top:10px; background:none; border:none; color:#ff4444; cursor:pointer;">✕</button>
                            <h4>${app.role}</h4>
                            <p style="font-size:12px; color:#aaa;">Handle: ${app.applicantName.toUpperCase()}</p>
                            <p style="font-size:13px; color:#ccc; margin-top:6px;">${app.skillDescription}</p>
                        </div>`;
                });
            });
        }

        function toggleSidebar() { let sb = document.getElementById('sidebar'); if(sb) sb.classList.toggle('active'); }
        function closeModals() { let m = document.getElementById('sellModal'); if(m) m.style.display = 'none'; resetSellForm(); }
        function resetSellForm() { document.getElementById('hardwareName').value = ""; document.getElementById('origPrice').value = ""; document.getElementById('aiVal').innerText = "₹0"; computedAppraisalValue = 0; }
        function toggleCart() { let cp = document.getElementById('cartPanel'); if(cp) cp.classList.toggle('active'); }
        function openSell() { if(currentUser) document.getElementById('sellModal').style.display = 'flex'; }
        function closeDMWindow() { document.getElementById('dmBox').style.display = 'none'; }
        function handleDMKey(e) { if(e.key === 'Enter') sendDMMessage(); }
        function logoutTerminal() { currentUser = null; localStorage.removeItem('potato_local_session'); let ag = document.getElementById('authGate'); if(ag) ag.style.display = 'flex'; }

        function switchTab(viewId) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            let targetView = document.getElementById(viewId); if(targetView) targetView.classList.add('active');
            let targetBtn = document.getElementById('btn-' + viewId); if(targetBtn) targetBtn.classList.add('active');
            let sb = document.getElementById('sidebar'); if(sb && sb.classList.contains('active')) toggleSidebar();
        }

        function filterMarketplace(category) { currentFilterCategory = category; document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active')); renderMarketGrid(); }

        window.onload = function() {
            let session = localStorage.getItem('potato_local_session');
            if(session && localAccounts[session]) loginSuccess(session);
        };
    </script>
</body>
</html>
